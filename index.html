<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOATS</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbwAhnJGD7IQuYFy9pxmC0OWXdqm6t9CP5nE0aN3qkkEFgz1mHxdUNrgNHW94n8N96aADw/exec"></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('GOATS PWA Active'))
          .catch(err => console.log('Registration failed', err));
      });
    }
  </script>
</body>
</html>
